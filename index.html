<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>糖友碳水加總小幫手</title>

<style>
  :root {
    --primary: #4A90E2;
    --bg: #F2F6F9;
    --card: #FFFFFF;
    --text: #2D3436;
    --accent: #FF7675;
  }

  body {
    font-family: -apple-system, "Noto Sans TC", sans-serif;
    background-color: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wrapper { width: 100%; max-width: 400px; }

  h1 { font-size: 22px; color: var(--primary); text-align: center; margin: 10px 0; }

  .card {
    background: var(--card);
    border-radius: 18px;
    padding: 15px;
    margin-bottom: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #636E72; }

  /* 搜尋區與分類按鈕 */
  #foodSearch {
    width: 100%;
    padding: 12px;
    border: 2px solid #E2E8F0;
    border-radius: 10px;
    margin-bottom: 10px;
    box-sizing: border-box;
    font-size: 16px;
  }

  .category-tabs {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
  }

  .tab {
    flex: 1;
    padding: 8px 0;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #E2E8F0;
    background: white;
    cursor: pointer;
    text-align: center;
  }

  .tab.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .food-list {
    max-height: 180px;
    overflow-y: auto;
    border: 1px solid #EDF2F7;
    border-radius: 10px;
    background: #FAFBFC;
  }

  .food-item {
    padding: 12px;
    border-bottom: 1px solid #EDF2F7;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    cursor: pointer;
  }

  /* 選取區 */
  .input-row { display: flex; gap: 8px; margin-top: 10px; align-items: center; }
  input[type="number"] {
    width: 70px;
    padding: 10px;
    font-size: 16px;
    border: 2px solid #E2E8F0;
    border-radius: 8px;
    text-align: center;
  }
  .add-btn {
    flex: 1;
    background: var(--primary);
    color: white;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
  }

  /* 清單區 */
  .calc-list {
    margin-top: 10px;
    border-top: 1px dashed #CBD5E0;
    padding-top: 10px;
  }
  .list-item {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 5px;
    background: #F8F9FA;
    padding: 8px;
    border-radius: 6px;
  }
  .del-btn { color: var(--accent); font-weight: bold; margin-left: 10px; cursor: pointer; }

  /* 總結區域 */
  .total-box {
    background: linear-gradient(135deg, #4A90E2, #3182CE);
    color: white;
    text-align: center;
    padding: 20px;
    border-radius: 20px;
    margin-top: 10px;
  }
  .total-val { font-size: 56px; font-weight: 900; margin: 5px 0; }
  .copy-btn {
    background: white; color: var(--primary); border: none;
    padding: 12px; border-radius: 25px; width: 100%; font-weight: bold; margin-top: 10px;
  }

  .link-btn {
    display: block; background: #2D3436; color: white;
    text-decoration: none; text-align: center; padding: 16px;
    border-radius: 15px; font-weight: bold; margin-top: 12px;
  }
</style>
</head>
<body>

<div class="wrapper">
  <h1>🍪 碳水加總計數器</h1>

  <div class="card">
    <label>1. 搜尋與分類</label>
    <div class="category-tabs">
      <div class="tab active" onclick="setCat('all', this)">全部</div>
      <div class="tab" onclick="setCat('snack', this)">中式早點</div>
      <div class="tab" onclick="setCat('main', this)">常用主食</div>
      <div class="tab" onclick="setCat('drink', this)">各式飲料</div>
    </div>
    <input type="text" id="foodSearch" placeholder="搜尋關鍵字..." oninput="renderList()">
    <div class="food-list" id="foodList"></div>
    
    <div class="input-row">
      <div style="font-size: 13px; color: #718096;">已選：<span id="selectedName">未選取</span></div>
    </div>
    <div class="input-row">
      <input id="baseCarb" type="number" placeholder="g">
      <div style="font-size: 14px;">×</div>
      <input id="portion" type="number" value="1" step="0.25">
      <div style="font-size: 14px;">份</div>
      <button class="add-btn" onclick="addToList()">➕ 加入清單</button>
    </div>
  </div>

  <div class="card">
    <label>2. 本餐清單</label>
    <div id="displayList" class="calc-list">
      <div style="color: #A0AEC0; font-size: 13px; text-align: center;">清單是空的</div>
    </div>
  </div>

  <div class="total-box">
    <div style="font-size:14px; opacity:0.9">總和 (整數)</div>
    <div class="total-val"><span id="grandTotal">0</span><span style="font-size:24px">g</span></div>
    <button class="copy-btn" id="cpBtn" onclick="copyTotal()">📋 複製數字</button>
  </div>

  <a href="https://adsccxx-cpu.github.io/insulin-calculator/" class="link-btn">🚀 前往計算胰島素</a>
</div>

<script>
const foodDB = [
  // 中式早點 (snack)
  {n: "飯糰 (1丸/正常)", c: 60, cat: "snack"},
  {n: "水煎包 (1顆/肉)", c: 15, cat: "snack"},
  {n: "水煎包 (1顆/菜)", c: 20, cat: "snack"},
  {n: "蔥油餅 (1/4張)", c: 15, cat: "snack"},
  {n: "蔥油餅 (1張)", c: 60, cat: "snack"},
  {n: "蔥抓餅 (1張)", c: 45, cat: "snack"},
  {n: "蛋餅 (1份)", c: 20, cat: "snack"},
  {n: "燒餅 (1條)", c: 30, cat: "snack"},
  {n: "油條 (1根)", c: 15, cat: "snack"},
  {n: "饅頭 (1顆/中)", c: 30, cat: "snack"},
  {n: "刈包 (1份/不含肉)", c: 30, cat: "snack"},
  {n: "肉包 (1顆)", c: 45, cat: "snack"},
  {n: "紅豆餅/車輪餅 (1顆)", c: 20, cat: "snack"},
  {n: "小籠包 (1顆/中型)", c: 8, cat: "snack"},
  {n: "小籠湯包 (1顆/大型)", c: 10, cat: "snack"},
  {n: "蘿蔔糕 (2片)", c: 30, cat: "snack"},
  
  // 常用主食 (main)
  {n: "白飯 (1碗)", c: 60, cat: "main"},
  {n: "白飯 (1/2碗)", c: 30, cat: "main"},
  {n: "吐司 (1片)", c: 15, cat: "main"},
  {n: "陽春麵 (1碗)", c: 30, cat: "main"},
  {n: "義大利麵 (1碗)", c: 45, cat: "main"},
  {n: "燕麥片 (3湯匙)", c: 15, cat: "main"},

  // 飲料 (drink)
  {n: "珍珠奶茶 (700ml/全糖)", c: 60, cat: "drink"},
  {n: "珍珠奶茶 (700ml/半糖)", c: 45, cat: "drink"},
  {n: "豆漿 (400ml/有糖)", c: 15, cat: "drink"},
  {n: "米漿 (400ml)", c: 40, cat: "drink"},
  {n: "可樂 (330ml/罐)", c: 35, cat: "drink"},
  {n: "多多綠 (700ml/全糖)", c: 70, cat: "drink"},
  {n: "鮮奶 (240ml)", c: 12, cat: "drink"},
  {n: "柳橙汁 (240ml)", c: 25, cat: "drink"}
];

let currentCat = 'all';
let currentList = [];
let selectedFood = { n: '', c: 0 };

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const kw = document.getElementById('foodSearch').value.toLowerCase();
  const list = document.getElementById('foodList');
  list.innerHTML = '';
  
  const filtered = foodDB.filter(f => {
    const matchKw = f.n.includes(kw);
    const matchCat = (currentCat === 'all' || f.cat === currentCat);
    return matchKw && matchCat;
  });

  filtered.forEach(f => {
    const div = document.createElement('div');
    div.className = 'food-item';
    div.innerHTML = `<span>${f.n}</span><span style="color:#4A90E2">${f.c}g</span>`;
    div.onclick = () => {
      selectedFood = f;
      document.getElementById('selectedName').innerText = f.n;
      document.getElementById('baseCarb').value = f.c;
      document.getElementById('portion').value = 1;
    };
    list.appendChild(div);
  });
}

function addToList() {
  const c = parseFloat(document.getElementById('baseCarb').value);
  const p = parseFloat(document.getElementById('portion').value);
  if(!c) return alert("請先選取食物");

  const name = selectedFood.n || "自定義";
  currentList.push({ name: name, carb: c * p });
  updateUI();
  
  // 重置選取
  document.getElementById('baseCarb').value = '';
  document.getElementById('selectedName').innerText = '未選取';
  selectedFood = { n: '', c: 0 };
}

function updateUI() {
  const listDiv = document.getElementById('displayList');
  const totalSpan = document.getElementById('grandTotal');
  
  if(currentList.length === 0) {
    listDiv.innerHTML = '<div style="color: #A0AEC0; font-size: 13px; text-align: center;">清單是空的</div>';
    totalSpan.innerText = '0';
    return;
  }

  let total = 0;
  listDiv.innerHTML = '';
  currentList.forEach((item, index) => {
    total += item.carb;
    const div = document.createElement('div');
    div.className = 'list-item';
    div.innerHTML = `<span>${item.name} (${Math.round(item.carb)}g)</span>
                     <span class="del-btn" onclick="removeItem(${index})">✕</span>`;
    listDiv.appendChild(div);
  });
  totalSpan.innerText = Math.round(total);
}

function removeItem(index) {
  currentList.splice(index, 1);
  updateUI();
}

function copyTotal() {
  const val = document.getElementById('grandTotal').innerText;
  navigator.clipboard.writeText(val).then(() => {
    document.getElementById('cpBtn').innerText = "✅ 已複製！";
    setTimeout(() => { document.getElementById('cpBtn').innerText = "📋 複製數字"; }, 1500);
  });
}

renderList(); // 初始載入
</script>

</body>
</html>
